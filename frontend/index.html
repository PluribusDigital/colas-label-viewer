<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTB COLA Label Viewer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>TTB COLA Label Viewer</h1>
      <p class="subtitle">Search the public Certificate of Label Approval registry</p>
    </div>
  </header>

  <main>
    <section class="search-bar">
      <input id="searchInput" type="search"
             placeholder="Search brands, class/type, permit holder..."
             autocomplete="off" aria-label="Search COLAs">
      <select id="beverageFilter" aria-label="Filter by beverage type">
        <option value="">All Beverage Types</option>
      </select>
      <button id="ingestBtn" title="Sync latest data from TTB registry">Sync Data</button>
    </section>

    <section class="results-meta" id="resultsMeta" aria-live="polite"></section>

    <section class="card-grid" id="cardGrid" aria-label="COLA label results"></section>

    <div class="pagination" id="pagination"></div>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="Close detail panel">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
